name: Create Release From Version

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/landingzones/__init__.py"
      - "pixi.toml"
      - ".github/workflows/release-on-version.yml"

permissions:
  contents: write

concurrency:
  group: release-from-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release for app version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep -oP "__version__\s*=\s*['\"]\K[^'\"]+(?=['\"])" src/landingzones/__init__.py)"
          PIXI_VERSION="$(grep -oP '^version\s*=\s*"\K[^"]+(?=")' pixi.toml)"
          if [ -z "$VERSION" ]; then
            echo "Could not detect package version" >&2
            exit 1
          fi
          if [ "$VERSION" != "$PIXI_VERSION" ]; then
            echo "Version mismatch: src/landingzones/__init__.py has $VERSION but pixi.toml has $PIXI_VERSION" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like MAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected release tag: $TAG"

      - name: Check existing release
        id: existing-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists; skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist yet."
          fi

      - name: Create release
        if: steps.existing-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Landing Zones $VERSION"
